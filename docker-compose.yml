services:
  mimo2api:
    # 使用已构建的镜像（优先），如需本地构建则改为 build: .
    image: ursillyb/mimocode2api:latest
    container_name: mimo2api
    restart: unless-stopped
    ports:
      - "${MIMO2API_PORT:-10000}:${MIMO2API_PORT:-10000}"
    environment:
      # 服务端口（保持与 ports 一致）
      - MIMO2API_PORT=${MIMO2API_PORT:-10000}
      # API 密钥（必填，用于保护本地代理，建议设置复杂密钥）
      - API_KEY=${API_KEY:-sk-change-me}
      # MiMo 上游地址（一般无需修改）
      - MIMO_FREE_BASE_URL=${MIMO_FREE_BASE_URL:-https://api.xiaomimimo.com}
      # 设备指纹（留空自动生成，建议保持为空）
      - MIMO_FINGERPRINT=${MIMO_FINGERPRINT:-}
      # 多指纹分身数量（配合代理负载均衡分流限流）
      - MIMO_FINGERPRINT_COUNT=${MIMO_FINGERPRINT_COUNT:-5}
      # 代理地址（搭配 OpenClash 等负载均衡，关闭长连接）
      - MIMO_PROXY_URL=${MIMO_PROXY_URL:-}
      # 或使用 HTTP_PROXY/HTTPS_PROXY 环境变量
      - MIMO_PROXY_ENABLED=${MIMO_PROXY_ENABLED:-false}
      # 调试日志
      - MIMO2API_DEBUG=${MIMO2API_DEBUG:-false}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${MIMO2API_PORT:-10000}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - mimo2api_net

networks:
  mimo2api_net:
    driver: bridge
